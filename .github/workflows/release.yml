# Build desktop installers and attach them to a GitHub Release when you push a version tag.
#
# Usage:
#   1. Set repository secret VITE_GOOGLE_CLIENT_ID (same Web client ID you use locally).
#   2. git tag v1.0.0 && git push origin v1.0.0
#   3. Open Actions → workflow run → Release appears with installers under Releases.
#
# Code signing (optional): add Windows/macOS signing secrets later; see electron-builder docs.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Windows installer
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build macOS
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: release/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libopenjp2-tools fakeroot xz-utils
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Linux
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: release/

  publish:
    needs: [build-win, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
