# Build desktop installers and attach them to a GitHub Release when you push a version tag.
#
# Usage:
#   1. Set repository secret VITE_GOOGLE_CLIENT_ID (same Web client ID you use locally).
#   2. git tag v1.0.0 && git push origin v1.0.0
#   3. Open Actions → workflow run → Release appears with installers under Releases.
#
# Code signing (optional): add Windows/macOS signing secrets later; see electron-builder docs.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Windows installer
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run dist:win
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build macOS
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run dist:mac
      - uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: release/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libopenjp2-tools fakeroot xz-utils
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Linux
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run dist:linux
      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: release/

  publish:
    needs: [build-win, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      # GitHub sometimes returns HTTP 403 "secondary rate limit" on burst API use; retry with backoff.
      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          REPO="${GITHUB_REPOSITORY}"
          FILES=( )
          while IFS= read -r -d '' f; do FILES+=( "$f" ); done < <(find artifacts -type f -print0)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No files under artifacts/"
            ls -laR artifacts || true
            exit 1
          fi
          for attempt in 1 2 3 4 5 6; do
            if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
              echo "Release $TAG exists; uploading/updating assets..."
              gh release upload "$TAG" "${FILES[@]}" --repo "$REPO" --clobber
              exit 0
            fi
            if gh release create "$TAG" "${FILES[@]}" --repo "$REPO" --title "$TAG" --generate-notes --verify-tag; then
              exit 0
            fi
            echo "::warning::Attempt $attempt failed (often a secondary rate limit). Sleeping 60s..."
            sleep 60
          done
          echo "::error::Release step failed after retries."
          exit 1
