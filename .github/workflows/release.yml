# Build desktop installers and attach them to a GitHub Release when you push a version tag.
#
# Usage:
#   1. Set repository secret VITE_GOOGLE_CLIENT_ID (same Web client ID you use locally).
#   2. Either push a tag: git tag v1.0.0 && git push origin v1.0.0
#      OR: Actions → Release → Run workflow → enter an existing tag (e.g. v0.1.2).
#   3. When the workflow finishes, installers appear under Releases.
#
# Code signing (optional): add Windows/macOS signing secrets later; see electron-builder docs.
#
# Re-running an old workflow run does NOT use release.yml from main — it uses the file from the
# commit that triggered that run. After changing this workflow, push a NEW tag (or a new commit’s tag)
# so GitHub picks up the updated steps; "Re-run failed jobs" alone will keep the old definition.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build and publish (must exist on origin), e.g. v0.1.2'
        required: true
        type: string

permissions:
  contents: write

# Quieter Node 20 deprecation warnings on Actions until upstream actions move to Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Tag ref for checkout: tag push uses the pushed ref; manual run uses the tag you type in the UI.
# (github.ref_name is the branch name on workflow_dispatch, so we must not rely on it for manual runs.)
jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Windows installer
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run dist:win
      # Only distributable installers — not win-unpacked/ (would upload hundreds of loose files).
      - uses: actions/upload-artifact@v7
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/*.yml

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build macOS
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run dist:mac
      - uses: actions/upload-artifact@v7
        with:
          name: mac-installer
          path: |
            release/*.dmg
            release/*.yml

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
      - name: Install Linux packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libopenjp2-tools fakeroot xz-utils
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Linux
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run dist:linux
      - uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: |
            release/*.AppImage
            release/*.deb
            release/*.yml

  publish:
    needs: [build-win, build-mac, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      # Avoid `gh release upload --clobber`: it DELETEs assets first and can 404 if metadata is out of sync.
      # Instead remove any existing *release* for this tag (the git tag stays), then create once with all files.
      # Retries help with secondary API rate limits.
      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          REPO="${GITHUB_REPOSITORY}"
          FILES=( )
          while IFS= read -r -d '' f; do FILES+=( "$f" ); done < <(find artifacts -type f \( \
            -iname '*.exe' -o -iname '*.dmg' -o -iname '*.appimage' -o -iname '*.deb' -o \
            -iname '*.yml' -o -iname '*.yaml' -o -iname '*.blockmap' \
          \) -print0)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No files under artifacts/"
            ls -laR artifacts || true
            exit 1
          fi
          for attempt in 1 2 3 4 5 6; do
            if gh release view "$TAG" --repo "$REPO" &>/dev/null; then
              echo "Removing existing GitHub Release $TAG (git tag is unchanged)..."
              gh release delete "$TAG" --repo "$REPO" --yes
            fi
            if gh release create "$TAG" "${FILES[@]}" --repo "$REPO" --title "$TAG" --generate-notes --verify-tag; then
              exit 0
            fi
            echo "::warning::Attempt $attempt failed (often a secondary rate limit). Sleeping 60s..."
            sleep 60
          done
          echo "::error::Release step failed after retries."
          exit 1
